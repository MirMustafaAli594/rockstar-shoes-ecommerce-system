<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>{{ brand.name }} Collection | Rockstar Shoes</title>
</head>
<body class="dark-theme" style="background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif;">
    
    <nav style="display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; border-bottom: 1px solid #222; background: #000;">
        <div class="logo" style="font-weight: 900; letter-spacing: 1px;"><a href="/" style="text-decoration: none; color: inherit;">Rockstar Shoes</a></div>
        <div class="menu">HOME | MAN | WOMAN | KIDS | SALE</div>
        <div class="search-cart" style="cursor:pointer; font-weight: bold;" onclick="location.href='/'">🏠 BACK HOME</div>
    </nav>

    <header class="product-header" style="text-align: center; padding: 40px 20px 10px;">
        <h1 style="font-size: 2.8rem; font-weight: 900; text-transform: uppercase; margin: 0; color: #ff4db8; text-shadow: 0 0 10px rgba(255, 77, 184, 0.3);">{{ brand.name }} Collection</h1>
        <p style="color: #666; margin-top: 5px;">Premium performance built for rockstars.</p>
    </header>

    <div class="product-grid-container" style="padding: 20px 5% 80px;">
        <div class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px;">
            {% for shoe in shoes %}
            <div class="shoe-card" style="background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;">
                <div class="img-box" style="background: #141414; height: 240px; display: flex; justify-content: center; align-items: center; padding: 15px; position: relative;">
                    <span class="heart" style="position: absolute; top: 12px; left: 12px; color: #444; font-size: 1.3rem; cursor: pointer;">♡</span>
                    <img src="{{ shoe.img }}" style="max-width: 90%; max-height: 90%; object-fit: contain;">
                </div>
                <div class="shoe-details" style="padding: 15px;">
                    <span class="tag" style="background: rgba(255, 77, 184, 0.1); color: #ff4db8; padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold;">Bestseller ✨</span>
                    <h4 style="margin: 8px 0 15px; font-size: 1.1rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ shoe.name }}</h4>
                    <div class="card-footer" style="display: flex; justify-content: space-between; align-items: center;">
                        <p class="price" style="font-size: 1.2rem; font-weight: bold; margin: 0; color: #fff;">₹{{ shoe.price }}</p>
                        <button class="cart-btn" style="background: #ff4db8; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer;">Add to Cart</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
